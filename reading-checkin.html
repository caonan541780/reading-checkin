<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>阅读打卡 · 三升四语文暑假衔接 v1.0</title>
<script src="https://cdn.bootcdn.net/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdn.bootcdn.net/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdn.bootcdn.net/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
  :root{
    --ink:#2D5F4E;
    --ink-deep:#1F4A3C;
    --paper:#FBF8F0;
    --paper-warm:#F5EEDC;
    --vermilion:#C8553D;
    --gold:#D4A574;
    --jade:#7BAE8E;
    --mist:#E8E0CE;
    --text:#3A2E1F;
    --text-soft:#6B5D4A;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color: transparent; margin:0; padding:0; }
  html,body{ font-family:'PingFang SC','Microsoft YaHei','微软雅黑',sans-serif; background:var(--paper); color:var(--text); line-height:1.5; }
  body{
    background-image:
      radial-gradient(circle at 12% 18%, rgba(212,165,116,0.10) 0, transparent 38%),
      radial-gradient(circle at 88% 82%, rgba(123,174,142,0.10) 0, transparent 42%);
    min-height:100vh;
  }
  .font-brush{ font-family:'STKaiti','KaiTi','楷体',serif; font-weight:700; }
  .font-kai{ font-family:'STKaiti','KaiTi','楷体',serif; }
  .font-serif-cn{ font-family:'STSong','SimSun','宋体',serif; }

  /* 加载提示 */
  #loading{
    position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:var(--paper); z-index:9999; gap:16px;
  }
  #loading .book{ font-size:48px; animation:bounce 1s ease-in-out infinite; }
  #loading .txt{ font-size:14px; color:var(--text-soft); }
  @keyframes bounce{ 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }

  /* 布局 */
  .app{ min-height:100vh; max-width:720px; margin:0 auto; padding:16px 16px 100px; }
  .row{ display:flex; align-items:center; }
  .between{ justify-content:space-between; }
  .center{ justify-content:center; }
  .col{ display:flex; flex-direction:column; }
  .gap-1{ gap:4px; } .gap-2{ gap:8px; } .gap-3{ gap:12px; } .gap-4{ gap:16px; }
  .mt-1{ margin-top:4px; } .mt-2{ margin-top:8px; } .mt-3{ margin-top:12px; } .mt-4{ margin-top:16px; } .mt-5{ margin-top:20px; }
  .mb-1{ margin-bottom:4px; } .mb-2{ margin-bottom:8px; } .mb-3{ margin-bottom:12px; } .mb-4{ margin-bottom:16px; }
  .flex-1{ flex:1; } .wrap{ flex-wrap:wrap; }
  .text-center{ text-align:center; } .text-right{ text-align:right; }
  .hidden{ display:none; }

  /* 卡片 */
  .card{
    background:rgba(255,253,247,0.92);
    border:1px solid var(--mist);
    border-radius:20px;
    box-shadow:0 6px 22px -10px rgba(45,95,78,0.18), 0 2px 6px -2px rgba(45,95,78,0.08);
    padding:20px;
    margin-bottom:16px;
  }
  .card-warm{
    background:linear-gradient(135deg, rgba(245,238,220,0.96), rgba(251,248,240,0.96));
    border:1px solid var(--gold);
  }
  .card-tight{ padding:16px; }

  /* 按钮 */
  .btn{
    border:none; cursor:pointer; font-family:inherit; font-weight:700;
    border-radius:16px; padding:14px 20px; font-size:15px;
    transition:transform .12s ease; display:inline-flex; align-items:center; justify-content:center; gap:6px;
    min-height:48px;
  }
  .btn:active{ transform:scale(0.97); }
  .btn-block{ width:100%; }
  .btn-primary{ background:linear-gradient(135deg, var(--ink), var(--ink-deep)); color:var(--paper); box-shadow:0 6px 16px -6px rgba(31,74,60,0.5); }
  .btn-vermilion{ background:linear-gradient(135deg, #D9674E, #C8553D); color:#FFF7EE; box-shadow:0 6px 16px -6px rgba(200,85,61,0.55); }
  .btn-ghost{ background:rgba(255,253,247,0.6); border:1.5px solid var(--ink); color:var(--ink); }
  .btn-sm{ padding:8px 14px; font-size:13px; min-height:40px; border-radius:12px; }
  .btn:disabled{ opacity:0.4; cursor:not-allowed; }

  /* 印章 */
  .ink-stamp{
    display:inline-flex;align-items:center;justify-content:center;
    border:2px solid var(--vermilion);color:var(--vermilion);
    font-family:'STKaiti','KaiTi','楷体',serif; font-weight:700;
    transform:rotate(-6deg);
    border-radius:6px;
    background:rgba(200,85,61,0.04);
  }

  /* 标签 */
  .chip{
    display:inline-flex;align-items:center;gap:4px;
    padding:3px 10px;border-radius:999px;font-size:12px;font-weight:600;
  }

  /* 底部导航 */
  .bottom-nav{
    position:fixed; bottom:0; left:0; right:0; z-index:40;
    max-width:720px; margin:0 auto; padding:8px 16px 12px;
  }
  .bottom-nav-inner{
    background:rgba(255,253,247,0.95);
    border:1px solid var(--mist);
    border-radius:20px;
    box-shadow:0 -4px 20px -8px rgba(45,95,78,0.2);
    display:flex; justify-content:space-around; align-items:center;
    padding:8px 4px;
    backdrop-filter:blur(8px);
  }
  .nav-item{
    display:flex;flex-direction:column;align-items:center;gap:2px;
    padding:6px 8px;border-radius:14px;font-size:11px;font-weight:600;
    color:var(--text-soft); cursor:pointer; border:none; background:none;
    font-family:inherit; min-width:52px; transition:all .2s ease;
  }
  .nav-item.active{ color:var(--ink); background:rgba(45,95,78,0.08); }
  .nav-item.active .nav-ico{ background:var(--ink); color:var(--paper); }
  .nav-ico{
    width:34px;height:34px;border-radius:12px;display:flex;align-items:center;justify-content:center;
    background:rgba(45,95,78,0.06);color:var(--text-soft);font-size:18px;
    transition:all .2s ease;
  }

  /* 分段选择 */
  .seg{ display:inline-flex; background:rgba(45,95,78,0.08); border-radius:12px; padding:3px; flex-wrap:wrap; gap:2px; }
  .seg button{
    padding:7px 14px;border-radius:10px;font-size:13px;font-weight:600;color:var(--text-soft);
    transition:all .15s ease; border:none; background:none; cursor:pointer; font-family:inherit;
  }
  .seg button.on{ background:var(--paper); color:var(--ink); box-shadow:0 2px 6px -2px rgba(0,0,0,0.12); }

  /* 热力图 */
  .heat-cell{
    width:100%; aspect-ratio:1; border-radius:6px; background:rgba(45,95,78,0.06);
    transition:transform .12s ease; display:flex; align-items:center; justify-content:center;
    font-size:11px; font-weight:600;
  }
  .heat-1{ background:rgba(123,174,142,0.55); color:#fff; }
  .heat-2{ background:rgba(123,174,142,0.8); color:#fff; }
  .heat-3{ background:rgba(45,95,78,0.7); color:#fff; }
  .heat-4{ background:var(--ink); color:#fff; }
  .heat-today{ outline:2px solid var(--vermilion); outline-offset:1px; }

  /* 输入框 */
  textarea, input[type=text], input[type=number], input[type=password], input[type=date]{
    width:100%;background:rgba(255,253,247,0.7);border:1.5px solid var(--mist);
    border-radius:14px;padding:12px 14px;font-size:15px;color:var(--text);
    font-family:inherit;resize:vertical;
  }
  textarea:focus, input:focus{ outline:none;border-color:var(--ink); background:#FFFDF7; }

  /* 进度环 */
  .ring-progress{
    --p:0;
    width:140px;height:140px;border-radius:50%;
    background:conic-gradient(var(--ink) calc(var(--p)*1%), rgba(45,95,78,0.12) 0);
    display:flex;align-items:center;justify-content:center;position:relative;
    margin:0 auto;
  }
  .ring-progress::before{
    content:'';position:absolute;inset:10px;border-radius:50%;background:var(--paper);
  }
  .ring-progress > div{ position:relative;z-index:1; text-align:center; }
  .timer-num{ font-variant-numeric:tabular-nums; }

  /* 动画 */
  .pop-in{ animation:popIn .4s cubic-bezier(.18,.89,.32,1.28); }
  @keyframes popIn{ from{transform:scale(.9);opacity:0} to{transform:scale(1);opacity:1} }
  .fade-in{ animation:fadeIn .5s ease; }
  @keyframes fadeIn{ from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .streak-flame{ animation:flame 1.6s ease-in-out infinite; display:inline-block; }
  @keyframes flame{ 0%,100%{transform:translateY(0) rotate(-3deg) scale(1)} 50%{transform:translateY(-3px) rotate(3deg) scale(1.08)} }

  /* 滚动条 */
  .scrollbar-thin::-webkit-scrollbar{ width:6px;height:6px; }
  .scrollbar-thin::-webkit-scrollbar-thumb{ background:rgba(45,95,78,0.25);border-radius:3px; }
  .scrollbar-thin::-webkit-scrollbar-track{ background:transparent; }
  .max-h-64{ max-height:256px; overflow-y:auto; }

  /* 徽章 */
  .badge-medal{
    width:56px;height:56px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;font-size:24px;
    background:radial-gradient(circle at 30% 30%, #F0D9A8, #D4A574 60%, #B8893F);
    box-shadow:0 6px 14px -4px rgba(180,137,63,0.6), inset 0 2px 4px rgba(255,255,255,0.5);
    border:2px solid #E8C896; margin:0 auto;
  }
  .badge-locked{
    background:rgba(45,95,78,0.08);box-shadow:none;border:2px dashed rgba(45,95,78,0.25);
    filter:grayscale(1);opacity:0.6;
  }

  /* 分隔线 */
  .seal-divider{
    display:flex;align-items:center;gap:10px;color:var(--ink);font-family:'STKaiti','KaiTi','楷体',serif;font-weight:700;font-size:15px;
  }
  .seal-divider::before,.seal-divider::after{
    content:'';flex:1;height:1px;background:linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  /* 书脊 */
  .book-spine{ width:6px; border-radius:3px; align-self:stretch; }

  /* 进度条 */
  .progress-bar{ height:8px; border-radius:4px; background:rgba(45,95,78,0.12); overflow:hidden; }
  .progress-bar > div{ height:100%; border-radius:4px; background:linear-gradient(90deg, var(--jade), var(--ink)); transition:width .5s ease; }

  /* 网格 */
  .grid-2{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .grid-3{ display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
  .grid-7{ display:grid; grid-template-columns:repeat(7,1fr); gap:6px; }
  .grid-ach{ display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }

  /* 文本 */
  .text-xs{ font-size:12px; } .text-sm{ font-size:14px; } .text-lg{ font-size:18px; } .text-xl{ font-size:20px; } .text-2xl{ font-size:24px; } .text-3xl{ font-size:30px; }
  .font-bold{ font-weight:700; } .font-semi{ font-weight:600; }
  .text-soft{ color:var(--text-soft); } .text-ink{ color:var(--ink); } .text-vermilion{ color:var(--vermilion); } .text-gold{ color:var(--gold); } .text-jade{ color:var(--jade); }
  .leading-tight{ line-height:1.2; }
  .truncate{ overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .min-w-0{ min-width:0; }

  /* 柱状图 */
  .bar-wrap{ display:flex; align-items:flex-end; justify-content:space-between; gap:6px; height:140px; }
  .bar-col{ flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; }
  .bar-track{ width:100%; border-radius:6px 6px 0 0; background:rgba(45,95,78,0.06); flex:1; display:flex; align-items:flex-end; min-height:40px; }
  .bar-fill{ width:100%; border-radius:6px 6px 0 0; min-height:4px; transition:height .5s ease; }

  @media (max-width:380px){
    .grid-ach{ grid-template-columns:repeat(2,1fr); }
    .text-3xl{ font-size:26px; }
  }
</style>
</head>
<body>
<div id="loading">
  <div class="book">📖</div>
  <div class="txt">正在加载阅读打卡…</div>
</div>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useMemo, useCallback } = React;

// ============ 主题数据：四上教材 8 周阅读计划 ============
const SUMMER_PLAN = [
  { week:1, day:1, unit:'第一单元·写景', text:'观潮', genre:'写景散文', minutes:30,
    focus:'重点词语：奇观、农历、据说、宽阔、滚动、顿时、逐渐、犹如、浩浩荡荡、山崩地裂',
    textContent:'【第3-5自然段·潮来时】本段描写潮水来时的壮观景象。先写午后远处传来闷雷般的响声，江面依然风平浪静；接着写一条白线从远处涌来，越近越快，犹如千万匹白色战马齐头并进；最后写潮头奔腾西去，声音如同山崩地裂。按"远→近"的顺序，从声音、形状两方面写出大潮的天下奇观。',
    task:'预习第3-5自然段（潮来时），圈画描写潮水声音、样子的句子，熟读2遍',
    book:'《山海经》', pages:'1-95 页',
    classical:'习作美文好段 · 写潮水', clText:'那浪潮越来越近，犹如千万匹白色战马齐头并进，浩浩荡荡地飞奔而来；那声音如同山崩地裂，好像大地都被震得颤动起来。', clTr:'赏析：用"千万匹白色战马"比喻浪潮，写出潮水的气势磅礴；"山崩地裂"形容声音巨大。可仿写瀑布、暴雨等壮观景象。'
  },
  { week:1, day:2, unit:'第一单元·写景', text:'观潮', genre:'写景散文', minutes:30,
    focus:'重点词语：若隐若现、人山人海、昂首东望、闷雷滚动、风平浪静、水天相接',
    textContent:'【第6自然段·潮去后】本段写潮头过去后的情景。潮头奔腾西去，余波还在漫天卷地般涌来，江面恢复平静。按"潮来→潮去"的顺序，用动与静的对比，突出钱塘江大潮的壮观与余韵。',
    task:'预习第6自然段（潮去后），背诵"霎时，潮头奔腾西去……"一段',
    book:'《山海经》', pages:'96-190 页',
    classical:'习作美文好段 · 写水静', clText:'钱塘江大潮，自古以来被称为天下奇观。宽阔的钱塘江横卧在眼前，江面很平静，越往东越宽，在雨后的阳光下，笼罩着一层蒙蒙的薄雾。', clTr:'赏析：先总起"天下奇观"，再写江面"平静""薄雾"，动静对比突出奇。可仿写湖面、河面等景物。'
  },
  { week:1, day:3, unit:'第一单元·写景', text:'走月亮', genre:'写景散文', minutes:30,
    focus:'重点词语：溪岸、淘洗、牵扶、闪烁、坑坑洼洼、浇灌、庄稼、风俗',
    textContent:'【第3-5自然段】本段写"我"和阿妈在溪边走月亮时见到的景物。先写溪水淘洗着卵石，溪水映着月光；再写山草和果园里的果香；最后写庄稼地里的情景。按"溪水→山草→果园→庄稼"的顺序，用拟人和排比写出月夜的柔和与母女亲情。',
    task:'预习第3-5自然段，圈画"我"和阿妈走月亮时见到的景物（溪水、山草、果园）',
    book:'《山海经》', pages:'191-285 页',
    classical:'习作美文好段 · 写月光', clText:'月儿是那样明亮，月光是那样柔和，照亮了高高的点苍山，照亮了村头的大青树，也照亮了村间的大道和小路……', clTr:'赏析：用排比句"照亮了……照亮了……照亮了……"写出月光的柔和与广阔，富有韵律感。可仿写阳光、灯光等。'
  },
  { week:1, day:4, unit:'第一单元·写景', text:'走月亮', genre:'写景散文', minutes:30,
    focus:'重点词语：柔和、春稻、新鲜、修筑、完工、满意、招待',
    textContent:'【第6-9自然段】本段反复出现"我和阿妈走月亮"，写"我"和阿妈走过溪岸、田埂，闻到果香和庄稼的气息，听到秋虫鸣叫。情感层层递进，由景入情，最后以"多么奇妙的夜晚"作结，表达对母爱的体会。',
    task:'预习第6-9自然段，背诵"我和阿妈走月亮"抒情段落，体会亲情',
    book:'《山海经》', pages:'286-380 页',
    classical:'习作美文好段 · 写亲情', clText:'多么奇妙的夜晚啊，我和阿妈走月亮！有时，阿妈给我讲月亮里面的故事……此时，阿妈牵着我，我闻到了阿妈身上的气息。', clTr:'赏析：反复出现"我和阿妈走月亮"，情感层层递进；用"气息"传递母爱。可仿写与亲人散步、游玩的温馨场景。'
  },
  { week:1, day:5, unit:'第一单元·写景', text:'现代诗二首', genre:'诗歌', minutes:30,
    focus:'重点词语：归巢、芦苇、剪秋罗、霸占、滴溜溜、眠、压',
    textContent:'【现代诗二首】本课含《秋晚的江上》和《花牛歌》两首诗。《秋晚的江上》写归巢的鸟儿驮着斜阳，双翅一翻把斜阳掉在江上，头白的芦苇妆成一瞬的红颜；《花牛歌》四节分别写花牛在草地里坐、眠、走、做梦，每节都以拟人手法呈现一幅童趣画面。',
    task:'预习《秋晚的江上》全诗，背诵《花牛歌》四节，圈画拟人句',
    book:'《中国古代神话》', pages:'1-84 页',
    classical:'习作美文好段 · 写夕阳', clText:'归巢的鸟儿，尽管是倦了，还驮着斜阳回去。双翅一翻，把斜阳掉在江上；头白的芦苇，也妆成一瞬的红颜了。', clTr:'赏析：用"驮""翻""妆成"等动词把鸟儿、芦苇拟人化，画面感极强。可仿写黄昏、傍晚的景象。'
  },
  { week:1, day:6, unit:'第一单元·写景', text:'繁星', genre:'写景散文', minutes:30,
    focus:'重点词语：密密麻麻、星群密布、半明半昧、摇摇欲坠、梦幻、怀抱',
    textContent:'【第3自然段·海上看星】本段写作者在海上舱面看星空的情景。先写深蓝天空悬着半明半昧的星；再写船动星也动，星星低得摇摇欲坠；最后写海上的夜是柔和、静寂、梦幻的。按"看星→感星→抒情"的顺序，写出星空的梦幻之美。',
    task:'预习第3自然段（海上看星），背诵"海上的夜是柔和的，是静寂的，是梦幻的"',
    book:'《中国古代神话》', pages:'85-168 页',
    classical:'习作美文好段 · 写星空', clText:'深蓝色的天空里悬着无数半明半昧的星。船在动，星也在动，它们是这样低，真是摇摇欲坠呢！', clTr:'赏析：用"悬""摇摇欲坠"写出星星的灵动，动静结合。可仿写夜空、星河等。'
  },
  { week:1, day:7, unit:'第一单元·写景', text:'本周复盘', genre:'周测', minutes:30,
    focus:'复习本周重点词语：奇观、浩浩荡荡、闪烁、坑坑洼洼、半明半昧、摇摇欲坠',
    textContent:'本周重点文段回顾，请翻阅课本本周所学《观潮》《走月亮》《现代诗二首》《繁星》，重点复习圈画的好句和背诵段落。',

  { week:2, day:1, unit:'第二单元·提问', text:'一个豆荚里的五粒豆', genre:'童话', minutes:30,
    focus:'重点词语：豌豆、按照、舒适、黑暗、恐惧、僵硬、丰满、等待',
    textContent:'【第1-10自然段】本段写一个豆荚里的五粒豆即将出发。五粒豆各有不同的愿望：最大的要飞向广大的世界，第二粒要直接飞到太阳里，第三粒想哪儿就睡哪儿，第四颗滚了一半就睡了，最小的那粒说"该怎么样就怎么样"。为后文第五粒豆的故事做铺垫。',
    task:'预习第1-10自然段，圈画五粒豆不同的"愿望"，提出2个问题',
    book:'《中国古代神话》', pages:'253-336 页',
    classical:'习作美文好段 · 写生长', clText:'小豌豆发了芽，长出了绿油油的叶子，顺着窗台向上爬，越爬越高，最后开出一朵紫色的小花。生病的小姑娘看着它，眼睛里渐渐有了光。', clTr:'赏析：按"发芽—长叶—爬藤—开花"的顺序写生长，层次分明。可仿写植物生长、春笋发芽等。'
  },
  { week:2, day:2, unit:'第二单元·提问', text:'一个豆荚里的五粒豆', genre:'童话', minutes:30,
    focus:'重点词语：虚弱、兴奋、爬、窗、阳光、温暖、绽放',
    textContent:'【第13-21自然段·第五粒豆】本段写第五粒豆落到窗台裂缝里发芽开花，给生病的小姑娘带来希望和快乐。先写豌豆发芽长叶爬藤开花，再写小姑娘看着它眼睛有了光，最后写小姑娘健康起来。借豌豆的生长写希望的力量。',
    task:'预习第13-21自然段（第五粒豆和小姑娘），写2句读后感受',
    book:'《中国古代神话》', pages:'337-420 页',
    classical:'习作美文好段 · 写希望', clText:'那粒豌豆射向空中，落到了一个窗台下的裂缝里。它躺在那里，并不灰心，它想："我要生长，我要开花！"——这小小的生命，竟成了一个病孩的全部快乐。', clTr:'赏析：用豌豆的"不灰心"反衬希望的珍贵，情感真挚。可仿写鼓励他人、逆境成长等。'
  },
  { week:2, day:3, unit:'第二单元·提问', text:'蝙蝠和雷达', genre:'说明文', minutes:30,
    focus:'重点词语：蝙蝠、清朗、捕捉、铃铛、苍蝇、证明、障碍物',
    textContent:'【第4-6自然段·科学家实验】本段写科学家揭密蝙蝠夜间飞行的三次实验。第一次蒙眼睛，铃铛一个没响；第二次塞耳朵，铃铛响个不停；第三次封嘴，铃铛也响个不停。证明蝙蝠飞行靠嘴和耳朵配合探路，而不是靠眼睛。',
    task:'预习第4-6自然段（科学家实验），梳理3次实验的过程，提出2个问题',
    book:'《希腊神话故事》', pages:'1-90 页',
    classical:'习作美文美段 · 写实验', clText:'科学家把蝙蝠的眼睛蒙上，让它在拉满铃铛的屋子里飞。蝙蝠飞了半天，铃铛一个也没响。原来，蝙蝠飞行不是靠眼睛，而是靠嘴和耳朵。', clTr:'赏析：用"蒙上""拉满""一个也没响"等词把实验过程写清楚，可仿写科学小实验、观察记录等。'
  },
  { week:2, day:4, unit:'第二单元·提问', text:'蝙蝠和雷达', genre:'说明文', minutes:30,

    task:'预习第7自然段，梳理"蝙蝠→雷达"的仿生学原理，背诵原理段',

  },
  { week:2, day:5, unit:'第二单元·提问', text:'呼风唤雨的世纪', genre:'说明文', minutes:30,

    textContent:'《题西林壁》\n横看成岭侧成峰，远近高低各不同。\n不识庐山真面目，只缘身在此山中。',

  { week:3, day:3, unit:'第三单元·观察', text:'爬山虎的脚', genre:'说明文', minutes:30,
    focus:'重点词语：操场、嫩红、舒服、均匀、重叠、空隙、茎柄',
    textContent:'【第2-3自然段·叶子和脚】本段细致观察爬山虎的叶子和脚。先写叶子：嫩红变嫩绿，绿得新鲜，叶尖一顺儿朝下，铺得均匀没有重叠也不留空隙；再写脚的位置（茎上长叶柄的反面）、形状（像蜗牛的触角）、颜色（嫩红）。按"叶子→脚"的顺序写连续观察。',
    task:'预习第2自然段（叶子）和第3自然段（脚的形状），圈画位置、形状、颜色',

    classical:'习作美文好段 · 写植物叶', clText:'爬山虎的嫩叶不大引人注意，引人注意的是长大了的叶子。那些叶子绿得那么新鲜，看着非常舒服。叶尖一顺儿朝下，在墙上铺得那么均匀，没有重叠起来的，也不留一点儿空隙。', clTr:'赏析：用"一顺儿朝下""均匀""没有重叠"等词细致观察叶子，可仿写观察树叶、花瓣等。'
  },
  { week:3, day:4, unit:'第三单元·观察', text:'爬山虎的脚', genre:'说明文', minutes:30,

  { week:3, day:5, unit:'第三单元·观察', text:'蟋蟀的住宅', genre:'说明文', minutes:30,

    textContent:'【第2-5自然段·选址】本段写蟋蟀与众不同的选址方式。先写别的昆虫在临时的隐蔽所藏身，蟋蟀却"不肯随遇而安"；再写它慎重选择住址，要排水优良、有温和阳光；最后写它自己挖掘，不利用现成的洞穴。用拟人手法把蟋蟀写得像建筑师。',

  { week:3, day:6, unit:'第三单元·观察', text:'蟋蟀的住宅', genre:'说明文', minutes:30,

  { week:4, day:1, unit:'第四单元·神话', text:'盘古开天地', genre:'神话故事', minutes:30,

    textContent:'【第2-3自然段·开天】本段写盘古开天地的经过。先写宇宙混沌如大鸡蛋，盘古睡了一万八千年；再写盘古醒来拿斧头劈开天地，轻而清的东西上升为天，重而浊的东西下降为地；最后写他头顶天脚踏地，天每天升高一丈，盘古也越长越高。按"睡→劈→撑"的顺序写起因和经过。',

    classical:'习作美文好段 · 写想象', clText:'很久很久以前，天和地还没有分开，宇宙混沌一片，像个大鸡蛋。有个叫盘古的巨人，在混沌之中睡了一万八千年。', clTr:'赏析：用"很久很久以前""大鸡蛋""一万八千年"营造神话的神奇感。可仿写童话、神话故事的开头。'
  },
  { week:4, day:2, unit:'第四单元·神话', text:'盘古开天地', genre:'神话故事', minutes:30,

const STORAGE_KEY = 'reading_checkin_v2';
function loadState(){
  try{ const s = localStorage.getItem(STORAGE_KEY); if(s) return JSON.parse(s); }catch(e){}
  return { checkins:{}, notes:[], bookProgress:{b1:0,b2:0,b3:0,b4:0,b5:0,b6:0,b7:0,b8:0,b9:0,b10:0,b11:0,b12:0,b13:0,b14:0,b15:0}, startDate:null, totalSeconds:0, unlockedAch:[], parentPwd:'1234' };
}
function saveState(s){ localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); }

function todayStr(){
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function fmtDate(d){
  const dt = new Date(d);
  return `${dt.getMonth()+1}月${dt.getDate()}日`;
}
function fmtDuration(sec){
  const m = Math.floor(sec/60), s = sec%60;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

const AppCtx = React.createContext(null);
function useApp(){ return React.useContext(AppCtx); }

function useStore(){
  const [state,setState] = useState(()=>loadState());
  const [tab,setTab] = useState('today');
  const [currentDay,setCurrentDay] = useState(()=>{
    const s = loadState();
    if(!s.startDate) return 1;
    const start = new Date(s.startDate);
    const now = new Date(todayStr());
    const diff = Math.floor((now-start)/(1000*60*60*24))+1;
    return Math.max(1, Math.min(56, diff));
  });

  const update = useCallback((fn)=>{
    setState(prev=>{ const next = typeof fn==='function' ? fn(prev) : fn; saveState(next); return next; });
  },[]);

  const checkIn = useCallback((dayIdx, durationSec, reflection)=>{
    update(prev=>{
      const date = todayStr();
      const checkins = {...prev.checkins};
      const notes = [...prev.notes];
      if(reflection && reflection.trim()){
        notes.unshift({ id:Date.now(), day:dayIdx, date, text:reflection.trim(), text_title:SUMMER_PLAN[dayIdx-1]?.text });
      }
      checkins[date] = {
        day: dayIdx, duration: durationSec,
        title: SUMMER_PLAN[dayIdx-1]?.text, unit: SUMMER_PLAN[dayIdx-1]?.unit,
        genre: SUMMER_PLAN[dayIdx-1]?.genre, completedAt: new Date().toISOString(),
      };
      const totalSeconds = prev.totalSeconds + durationSec;
      const startDate = prev.startDate || date;
      const unlockedAch = [...prev.unlockedAch];
      const totalDays = Object.keys(checkins).length;
      const noteCount = notes.length;
      const streak = calcStreak(checkins);
      const tryUnlock = (id,cond)=>{ if(cond && !unlockedAch.includes(id)) unlockedAch.push(id); };
      tryUnlock('a1', totalDays>=1);
      tryUnlock('a2', streak>=3);
      tryUnlock('a3', streak>=7);
      tryUnlock('a4', totalDays>=15);
      tryUnlock('a5', totalDays>=30);
      tryUnlock('a6', totalSeconds>=200*60);
      tryUnlock('a7', noteCount>=20);
      const bookDone = Object.entries(prev.bookProgress).filter(([k,v])=>v>=BOOKS.find(b=>b.id===k).total).length;
      const happyDone = ['b1','b2','b3'].every(id=>prev.bookProgress[id]>=BOOKS.find(b=>b.id===id).total);
      tryUnlock('a8', bookDone>=1);
      tryUnlock('a9', bookDone>=3);
      tryUnlock('a10', bookDone>=5);
      tryUnlock('a11', bookDone>=10);
      tryUnlock('a12', bookDone>=15);
      tryUnlock('a13', totalDays>=56);
      tryUnlock('a14', totalDays>=56);
      tryUnlock('a15', happyDone);
      return { ...prev, checkins, notes, totalSeconds, startDate, unlockedAch };
    });
  },[update]);

  const addNote = useCallback((note)=>{
    update(prev=>({ ...prev, notes:[{id:Date.now(), date:todayStr(), ...note}, ...prev.notes] }));
  },[update]);

  const deleteNote = useCallback((id)=>{
    update(prev=>({...prev, notes:prev.notes.filter(n=>n.id!==id)}));
  },[update]);

  const updateBookProgress = useCallback((bookId, val)=>{
    update(prev=>{
      const bookProgress = {...prev.bookProgress, [bookId]:Math.max(0,val)};
      const unlockedAch = [...prev.unlockedAch];
      const done = Object.entries(bookProgress).filter(([k,v])=>v>=BOOKS.find(b=>b.id===k).total).length;
      const happyDone = ['b1','b2','b3'].every(id=>bookProgress[id]>=BOOKS.find(b=>b.id===id).total);
      const tryUnlock = (id,cond)=>{ if(cond && !unlockedAch.includes(id)) unlockedAch.push(id); };
      tryUnlock('a8', done>=1);
      tryUnlock('a9', done>=3);
      tryUnlock('a10', done>=5);
      tryUnlock('a11', done>=10);
      tryUnlock('a12', done>=15);
      tryUnlock('a15', happyDone);
      return {...prev, bookProgress, unlockedAch};
    });
  },[update]);

  const setStartDate = useCallback((date)=>{ update(prev=>({...prev, startDate:date})); },[update]);

  const resetAll = useCallback(()=>{
    if(confirm('确定要清空所有打卡记录吗？此操作不可恢复。')){
      const fresh = { checkins:{}, notes:[], bookProgress:{b1:0,b2:0,b3:0,b4:0,b5:0,b6:0,b7:0,b8:0,b9:0,b10:0,b11:0,b12:0,b13:0,b14:0,b15:0}, startDate:null, totalSeconds:0, unlockedAch:[], parentPwd:'1234' };
      saveState(fresh); setState(fresh); setCurrentDay(1);
    }
  },[]);

  const setParentPwd = useCallback((pwd)=>{
    update(prev=>({...prev, parentPwd:pwd}));
  },[update]);

  const stats = useMemo(()=>{
    const checkinList = Object.entries(state.checkins).map(([date,v])=>({date,...v})).sort((a,b)=>b.date.localeCompare(a.date));
    const totalDays = checkinList.length;
    const totalMinutes = Math.round(state.totalSeconds/60);
    const streak = calcStreak(state.checkins);
    const progressPct = Math.round(totalDays/56*100);
    return { checkinList, totalDays, totalMinutes, streak, progressPct };
  },[state]);

  return { state, tab, setTab, currentDay, setCurrentDay, checkIn, addNote, deleteNote, updateBookProgress, setStartDate, resetAll, setParentPwd, stats };
}

function calcStreak(checkins){
  if(Object.keys(checkins).length===0) return 0;
  let streak = 0;
  let d = new Date();
  const today = todayStr();
  if(!checkins[today]) d.setDate(d.getDate()-1);
  while(true){
    const ds = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    if(checkins[ds]) streak++; else break;
    d.setDate(d.getDate()-1);
  }
  return streak;
}

        <textarea rows="3" placeholder="例：我感受到了潮水的壮观，仿佛身临其境……" value={reflection} onChange={e=>setReflection(e.target.value)} />
        <div className="text-xs mt-1 text-right text-soft">{reflection.length} 字</div>
      </div>

      {/* 打卡按钮 */}
      <button className="btn btn-vermilion btn-block" style={{marginBottom:16,fontSize:16,padding:'16px'}} onClick={handleCheckIn}>
        ✓ 完成今日打卡（第 {currentDay} 天）
      </button>

      <ClassicalCard day={currentDay} />
      <DayNavigator />
    </div>
  );
}

function DayNavigator(){
  const { currentDay, setCurrentDay } = useApp();
  return (
    <div className="row gap-2">
      <button className="btn btn-ghost btn-sm flex-1" disabled={currentDay<=1} onClick={()=>setCurrentDay(d=>Math.max(1,d-1))}>← 前一天</button>
      <span className="text-xs font-semi text-soft" style={{padding:'0 8px'}}>{currentDay}/56</span>
      <button className="btn btn-ghost btn-sm flex-1" disabled={currentDay>=56} onClick={()=>setCurrentDay(d=>Math.min(56,d+1))}>后一天 →</button>
    </div>
  );
}

function ClassicalCard({day}){
  const plan = SUMMER_PLAN[day-1];
  if(!plan) return null;
  return (
    <div className="card">
      <div className="seal-divider mb-3">📜 习作美文好段</div>
      <div className="text-xs font-semi mb-1" style={{color:'#5B3A8E'}}>{plan.classical}</div>
      <div className="font-kai text-lg mt-2" style={{padding:12,borderRadius:12,background:'rgba(91,58,142,0.06)',lineHeight:1.8}}>
        {plan.clText}
      </div>
      <div className="mt-2 text-sm text-soft">
        <span className="font-semi text-ink">赏析：</span>{plan.clTr}
      </div>
    </div>
  );
}

function CalendarPage(){
  const { state, stats } = useApp();
  const [viewMonth,setViewMonth] = useState(new Date().getMonth());
  const [viewYear,setViewYear] = useState(new Date().getFullYear());

  const days = useMemo(()=>{
    const arr = [];
    const first = new Date(viewYear, viewMonth, 1);
    const last = new Date(viewYear, viewMonth+1, 0);
    const startWeekday = (first.getDay()+6)%7;
    for(let i=0;i<startWeekday;i++) arr.push(null);
    for(let d=1; d<=last.getDate(); d++){
      const ds = `${viewYear}-${String(viewMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      arr.push({ day:d, dateStr:ds, checkin:state.checkins[ds] });
    }
    return arr;
  },[viewYear,viewMonth,state.checkins]);

  const monthLabel = `${viewYear}年${viewMonth+1}月`;
  const today = todayStr();
  const prevMonth = ()=>{ if(viewMonth===0){setViewMonth(11);setViewYear(y=>y-1)} else setViewMonth(m=>m-1); };
  const nextMonth = ()=>{ if(viewMonth===11){setViewMonth(0);setViewYear(y=>y+1)} else setViewMonth(m=>m+1); };

  return (
    <div className="fade-in">
      <div className="card">
        <div className="row between mb-4">
          <button className="btn btn-ghost btn-sm" onClick={prevMonth}>‹</button>
          <h2 className="font-brush text-xl text-ink">{monthLabel}</h2>
          <button className="btn btn-ghost btn-sm" onClick={nextMonth}>›</button>
        </div>
        <div className="grid-7 mb-2">
          {['一','二','三','四','五','六','日'].map(w=>(
            <div key={w} className="text-center text-xs font-semi text-soft" style={{padding:'4px 0'}}>{w}</div>
          ))}
        </div>
        <div className="grid-7">
          {days.map((d,i)=>{
            if(!d) return <div key={i}></div>;
            const min = d.checkin?.duration ? Math.round(d.checkin.duration/60) : 0;
            let level = '';
            if(d.checkin) level = min>=20?'heat-4':min>=12?'heat-3':min>=7?'heat-2':'heat-1';
            const isToday = d.dateStr===today;
            return (
              <div key={i} className={`heat-cell ${level} ${isToday?'heat-today':''}`}>
                {d.day}
              </div>
            );
          })}
        </div>
        <div className="mt-4 row center gap-3 text-xs text-soft" style={{justifyContent:'center'}}>
          <span>少</span>
          <div className="heat-cell" style={{width:14,height:14,aspectRatio:'unset'}}></div>
          <div className="heat-cell heat-1" style={{width:14,height:14,aspectRatio:'unset'}}></div>
          <div className="heat-cell heat-2" style={{width:14,height:14,aspectRatio:'unset'}}></div>
          <div className="heat-cell heat-3" style={{width:14,height:14,aspectRatio:'unset'}}></div>
          <div className="heat-cell heat-4" style={{width:14,height:14,aspectRatio:'unset'}}></div>
          <span>多</span>
        </div>
      </div>

      <div className="grid-2">
        <div className="card text-center card-tight">
          <div className="text-3xl font-bold text-ink">{stats.totalDays}</div>
          <div className="text-xs mt-1 text-soft">累计打卡</div>
        </div>
        <div className="card text-center card-tight">
          <div className="text-3xl font-bold text-vermilion">{stats.streak}</div>
          <div className="text-xs mt-1 text-soft">连续天数</div>
        </div>
        <div className="card text-center card-tight">
          <div className="text-3xl font-bold text-gold">{stats.totalMinutes}</div>
          <div className="text-xs mt-1 text-soft">阅读分钟</div>
        </div>
        <div className="card text-center card-tight">
          <div className="text-3xl font-bold text-jade">{stats.progressPct}%</div>
          <div className="text-xs mt-1 text-soft">暑假进度</div>
        </div>
      </div>

      <div className="card">
        <div className="seal-divider mb-3">📅 最近打卡</div>
        {stats.checkinList.length===0 ? (
          <div className="text-center text-sm text-soft" style={{padding:'24px 0'}}>还没有打卡记录，开始第一次阅读吧～</div>
        ) : (
          <div className="max-h-64 scrollbar-thin">
            {stats.checkinList.slice(0,10).map((c,i)=>(
              <div key={i} className="row gap-3" style={{padding:8,borderRadius:12,marginBottom:8,background:'rgba(45,95,78,0.04)'}}>
                <div style={{width:40,height:40,borderRadius:12,display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,fontWeight:700,flexShrink:0,background:GENRE_COLORS[c.genre]?.bg||'#7BAE8E',color:'#fff'}}>{c.day}</div>
                <div className="flex-1 min-w-0">
                  <div className="text-sm font-semi truncate text-ink">{c.title}</div>
                  <div className="text-xs text-soft">{fmtDate(c.date)} · {Math.round(c.duration/60)}分钟</div>
                </div>
                <div className="text-lg text-vermilion">✓</div>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

function BooksPage(){
  const { state, updateBookProgress } = useApp();
  const [editing,setEditing] = useState(null);
  const [val,setVal] = useState('');

  const startEdit = (book)=>{ setEditing(book.id); setVal(state.bookProgress[book.id]||0); };
  const saveEdit = ()=>{ if(editing) updateBookProgress(editing, Number(val)); setEditing(null); };

  // 整体阅读统计
  const doneCount = BOOKS.filter(b=>(state.bookProgress[b.id]||0)>=b.total).length;
  const readingCount = BOOKS.filter(b=>{ const v=state.bookProgress[b.id]||0; return v>0 && v<b.total; }).length;
  const totalPct = Math.round(doneCount/BOOKS.length*100);

  return (
    <div className="fade-in">
      {/* 整体概览 */}
      <div className="card card-warm">
        <div className="seal-divider mb-2">📚 我的书架</div>
        <div className="row gap-3 mt-3" style={{justifyContent:'space-around'}}>
          <div className="text-center">
            <div className="text-2xl font-bold text-ink">{BOOKS.length}</div>
            <div className="text-xs text-soft mt-1">总书目</div>
          </div>
          <div className="text-center">
            <div className="text-2xl font-bold text-jade">{doneCount}</div>
            <div className="text-xs text-soft mt-1">已读完</div>
          </div>
          <div className="text-center">
            <div className="text-2xl font-bold text-gold">{readingCount}</div>
            <div className="text-xs text-soft mt-1">阅读中</div>
          </div>
          <div className="text-center">
            <div className="text-2xl font-bold text-vermilion">{totalPct}%</div>
            <div className="text-xs text-soft mt-1">完成率</div>
          </div>
        </div>
        <div className="mt-3">
          <div className="progress-bar"><div style={{width:totalPct+'%'}}></div></div>
        </div>
      </div>

      {/* 分组展示 */}
      {BOOK_GROUPS.map((g,gi)=>{
        const groupDone = g.books.filter(b=>(state.bookProgress[b.id]||0)>=b.total).length;
        return (
          <div key={gi} className="card">
            <div className="row between mb-3">
              <div>
                <div className="font-brush text-lg text-ink">{g.group}</div>
                <div className="text-xs text-soft mt-1">{g.desc}</div>
              </div>
              <div className="chip" style={{background:'rgba(45,95,78,0.12)',color:'var(--ink)'}}>
                {groupDone}/{g.books.length}
              </div>
            </div>

            {g.books.map(book=>{
              const cur = state.bookProgress[book.id]||0;
              const pct = Math.min(100, Math.round(cur/book.total*100));
              const done = cur>=book.total;
              const cc = CAT_COLORS[book.cat]||{bg:'#7BAE8E',text:'#fff'};
              return (
                <div key={book.id} style={{padding:'10px 0',borderTop: book.id!==g.books[0].id?'1px dashed var(--mist)':'none'}}>
                  <div className="row gap-2">
                    <div className="book-spine" style={{background:book.color}}></div>
                    <div className="flex-1 min-w-0">
                      <div className="row between gap-2">
                        <div className="flex-1 min-w-0">
                          <h3 className="font-serif-cn font-semi text-base text-ink truncate">{book.title}</h3>
                          <div className="text-xs mt-1 text-soft">{book.author}</div>
                        </div>
                        {done ? (
                          <div className="chip" style={{background:'rgba(212,165,116,0.2)',color:'#7A5A2A'}}>✓ 读完</div>
                        ) : (
                          <div className="chip" style={{background:cc.bg+'22',color:cc.text}}>{book.cat}</div>
                        )}
                      </div>
                      <div className="mt-2">
                        <div className="row between text-xs mb-1">
                          <span className="text-soft">{cur} / {book.total} {book.unit}</span>
                          <span className="font-semi text-ink">{pct}%</span>
                        </div>
                        <div className="progress-bar"><div style={{width:pct+'%'}}></div></div>
                      </div>
                      {editing===book.id ? (
                        <div className="mt-2 row gap-2">
                          <input type="number" value={val} onChange={e=>setVal(e.target.value)} style={{padding:'8px 12px',fontSize:14}} />
                          <button className="btn btn-primary btn-sm" onClick={saveEdit}>保存</button>
                          <button className="btn btn-ghost btn-sm" onClick={()=>setEditing(null)}>取消</button>
                        </div>
                      ) : (
                        <button className="btn btn-ghost btn-sm mt-2" style={{fontSize:12,padding:'6px 12px',minHeight:36}} onClick={()=>startEdit(book)}>更新进度</button>
                      )}
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        );
      })}

      <div className="text-center text-xs text-soft" style={{padding:'8px 0'}}>
        💡 点击"更新进度"记录阅读页数，读完自动解锁成就
      </div>
    </div>
  );
}

function NotesPage(){
  const { state, addNote, deleteNote } = useApp();
  const [showForm,setShowForm] = useState(false);
  const [type,setType] = useState('优美句子');
  const [content,setContent] = useState('');
  const [source,setSource] = useState('');
  const types = ['优美句子','读后感悟','美文摘抄','生字积累','好词好段'];

  const submit = ()=>{
    if(!content.trim()) return;
    addNote({ type, text:content.trim(), source:source.trim()||'课外' });
    setContent(''); setSource(''); setShowForm(false);
  };

  return (
    <div className="fade-in">
      <div className="card">
        <div className="row between">
          <div>
            <div className="seal-divider mb-1">📝 阅读素材本</div>
            <p className="text-xs text-soft mt-2">积累优美句子、读后感悟、美文摘抄</p>
          </div>
          <button className="btn btn-primary btn-sm" onClick={()=>setShowForm(v=>!v)}>{showForm?'取消':'＋ 新增'}</button>
        </div>
      </div>

      {showForm && (
        <div className="card pop-in">
          <div className="seg mb-3">
            {types.map(t=>(<button key={t} className={type===t?'on':''} onClick={()=>setType(t)}>{t}</button>))}
          </div>
          <textarea rows="3" placeholder="写下你想积累的内容…" value={content} onChange={e=>setContent(e.target.value)} />
          <input type="text" className="mt-2" placeholder="来源（如：《观潮》/ 课外）" value={source} onChange={e=>setSource(e.target.value)} />
          <button className="btn btn-primary btn-block mt-3" onClick={submit}>保存</button>
        </div>
      )}

      {state.notes.length===0 ? (
        <div className="card text-center" style={{padding:32}}>
          <div style={{fontSize:40,marginBottom:8}}>📒</div>
          <div className="text-sm text-soft">还没有笔记，点击"新增"开始积累吧</div>
        </div>
      ) : (
        state.notes.map(note=>(
          <div className="card fade-in" key={note.id}>
            <div className="row between mb-2">
              <div className="chip" style={{background:'rgba(45,95,78,0.1)',color:'var(--ink)'}}>{note.type}</div>
              <div className="row gap-2">
                <span className="text-xs text-soft">{fmtDate(note.date)} · {note.source}</span>
                <button className="text-xs" style={{color:'var(--vermilion)',padding:'4px 8px',borderRadius:8,background:'rgba(200,85,61,0.08)',border:'none',cursor:'pointer',fontFamily:'inherit'}} onClick={()=>deleteNote(note.id)}>删除</button>
              </div>
            </div>
            <div className="font-serif-cn text-base" style={{lineHeight:1.7}}>{note.text}</div>
            {note.text_title && <div className="text-xs mt-2 text-soft">— 《{note.text_title}》</div>}
          </div>
        ))
      )}
    </div>
  );
}

function StatsPage(){
  const { state, stats, setStartDate, resetAll, setParentPwd } = useApp();
  const [pwd,setPwd] = useState('');
  const [authed,setAuthed] = useState(false);
  const [newPwd,setNewPwd] = useState('');
  const [newPwd2,setNewPwd2] = useState('');

  const weeklyStats = useMemo(()=>{
    const w = Array(8).fill(0).map((_,i)=>({week:i+1, days:0}));
    Object.values(state.checkins).forEach(c=>{
      if(c.day){ const plan = SUMMER_PLAN[c.day-1]; if(plan) w[plan.week-1].days++; }
    });
    return w;
  },[state.checkins]);

  const genreStats = useMemo(()=>{
    const g = {};
    Object.values(state.checkins).forEach(c=>{ if(!c.genre) return; g[c.genre] = (g[c.genre]||0)+1; });
    return Object.entries(g).sort((a,b)=>b[1]-a[1]);
  },[state.checkins]);

  const maxWeekDays = Math.max(...weeklyStats.map(w=>w.days),1);

  const handleAuth = ()=>{
    if(pwd===(state.parentPwd||'1234')){ setAuthed(true); setPwd(''); }
    else alert('密码错误，默认密码 1234');
  };
  const handleChangePwd = ()=>{
    if(!newPwd || newPwd.length<4){ alert('新密码至少 4 位'); return; }
    if(newPwd!==newPwd2){ alert('两次输入不一致'); return; }
    setParentPwd(newPwd);
    setNewPwd(''); setNewPwd2('');
    alert('家长密码已修改');
  };

  return (
    <div className="fade-in">
      <div className="card card-warm text-center">
        <div className="text-xs font-semi mb-2 text-soft">暑假阅读总览</div>
        <div className="grid-3">
          <div>
            <div className="text-3xl font-bold text-ink">{stats.totalDays}</div>
            <div className="text-xs mt-1 text-soft">打卡天数</div>
          </div>
          <div>
            <div className="text-3xl font-bold text-vermilion">{stats.totalMinutes}</div>
            <div className="text-xs mt-1 text-soft">阅读分钟</div>
          </div>
          <div>
            <div className="text-3xl font-bold text-gold">{stats.streak}</div>
            <div className="text-xs mt-1 text-soft">连续天数</div>
          </div>
        </div>
        <div className="mt-4">
          <div className="row between text-xs mb-1">
            <span className="text-soft">暑假进度</span>
            <span className="font-bold text-ink">{stats.totalDays}/56 天 · {stats.progressPct}%</span>
          </div>
          <div className="progress-bar"><div style={{width:stats.progressPct+'%'}}></div></div>
        </div>
      </div>

      <div className="card">
        <div className="seal-divider mb-4">📊 每周打卡统计</div>
        <div className="bar-wrap">
          {weeklyStats.map(w=>(
            <div className="bar-col" key={w.week}>
              <div className="text-xs font-bold text-ink">{w.days}</div>
              <div className="bar-track">
                <div className="bar-fill" style={{
                  height:(w.days/maxWeekDays*100)+'%',
                  background:w.days>=7?'linear-gradient(180deg,#D4A574,#C8553D)':'linear-gradient(180deg,#7BAE8E,#2D5F4E)'
                }}></div>
              </div>
              <div className="text-xs text-soft">W{w.week}</div>
            </div>
          ))}
        </div>
      </div>

      {genreStats.length>0 && (
        <div className="card">
          <div className="seal-divider mb-3">🎨 阅读文体分布</div>
          <div className="col gap-2">
            {genreStats.map(([genre,count])=>{
              const max = genreStats[0][1];
              const pct = Math.round(count/max*100);
              return (
                <div className="row gap-2" key={genre}>
                  <div className="text-xs font-semi" style={{width:72}}>{genre}</div>
                  <div style={{flex:1,height:20,borderRadius:8,overflow:'hidden',background:'rgba(45,95,78,0.06)'}}>
                    <div style={{height:'100%',borderRadius:8,display:'flex',alignItems:'center',justifyContent:'flex-end',paddingRight:8,width:Math.max(pct,15)+'%',background:GENRE_COLORS[genre]?.bg||'#7BAE8E',color:'#fff',fontSize:12,fontWeight:700}}>{count}</div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      <div className="card">
        <div className="seal-divider mb-4">🏆 成就墙（{state.unlockedAch.length}/{ACHIEVEMENTS.length}）</div>
        <div className="grid-ach">
          {ACHIEVEMENTS.map(a=>{
            const unlocked = state.unlockedAch.includes(a.id);
            return (
              <div className="text-center" key={a.id}>
                <div className={`badge-medal ${unlocked?'':'badge-locked'}`}>{a.icon}</div>
                <div className="text-xs font-semi mt-1" style={{color:unlocked?'var(--ink)':'var(--text-soft)'}}>{a.name}</div>
                <div className="text-xs" style={{fontSize:10,lineHeight:1.3,marginTop:2,color:'var(--text-soft)'}}>{a.desc}</div>
              </div>
            );
          })}
        </div>
      </div>

      <div className="card">
        <div className="seal-divider mb-3">⚙️ 家长区</div>
        {!authed ? (
          <div className="row gap-2">
            <input type="password" placeholder="家长密码（默认1234）" value={pwd} onChange={e=>setPwd(e.target.value)} />
            <button className="btn btn-primary btn-sm" style={{whiteSpace:'nowrap'}} onClick={handleAuth}>进入</button>
          </div>
        ) : (
          <div className="col gap-3 fade-in">
            <div>
              <label className="text-xs font-semi text-soft">暑假开始日期</label>
              <input type="date" value={state.startDate||todayStr()} onChange={e=>setStartDate(e.target.value)} />
            </div>
            <div style={{borderRadius:12,padding:12,fontSize:12,background:'rgba(200,85,61,0.06)',color:'var(--text-soft)'}}>
              💡 开始日期用于计算"当前应到第几天"。修改后今日学习页会跳到对应天数。
            </div>

            <div className="seal-divider" style={{fontSize:13}}>🔒 修改家长密码</div>
            <input type="password" placeholder="新密码（至少4位）" value={newPwd} onChange={e=>setNewPwd(e.target.value)} />
            <input type="password" placeholder="再次输入新密码" value={newPwd2} onChange={e=>setNewPwd2(e.target.value)} />
            <button className="btn btn-primary btn-block btn-sm" onClick={handleChangePwd}>保存新密码</button>

            <button className="btn btn-vermilion btn-block btn-sm" onClick={resetAll}>🗑 清空所有打卡记录</button>
            <button className="btn btn-ghost btn-block btn-sm" onClick={()=>setAuthed(false)}>退出家长区</button>
          </div>
        )}
      </div>

      <div className="text-center text-xs text-soft" style={{padding:'8px 0',lineHeight:1.7}}>
        阅读打卡 · 三升四语文暑假衔接 · v1.0<br/>
        数据仅保存在本机浏览器，不上传任何服务器
      </div>

      <AboutSection />
    </div>
  );
}

function AboutSection(){
  const [open,setOpen] = useState(false);
  return (
    <div className="card">
      <button className="row between" style={{width:'100%',background:'none',border:'none',cursor:'pointer',fontFamily:'inherit',fontSize:15,fontWeight:700,color:'var(--ink)'}} onClick={()=>setOpen(v=>!v)}>
        <span>ℹ️ 关于与免责声明</span>
        <span style={{fontSize:12,color:'var(--text-soft)'}}>{open?'收起 ▲':'展开 ▼'}</span>
      </button>
      {open && (
        <div className="fade-in mt-3" style={{fontSize:12,lineHeight:1.8,color:'var(--text-soft)'}}>

          <p style={{marginBottom:8}}><b style={{color:'var(--ink)'}}>版权声明：</b>课文标题、单元名称等归属于教材出版方所有，本工具不收录课文原文，仅作为学习引导；推荐书目的著作权归原作者所有，请通过正规渠道购买或借阅正版图书。文言文短句为古籍公共领域内容节选。</p>
          <p style={{marginBottom:8}}><b style={{color:'var(--ink)'}}>隐私说明：</b>所有学习记录（打卡、笔记、进度）仅保存在本机浏览器的 localStorage 中，不上传至任何服务器，不会收集任何个人信息。清除浏览器数据将删除全部记录，请及时备份。</p>
          <p style={{marginBottom:8}}><b style={{color:'var(--ink)'}}>使用提示：</b>家长密码默认 1234，可在家长区修改；建议家长协助小学生使用，控制每日用眼时长。</p>
          <p style={{marginBottom:0}}><b style={{color:'var(--ink)'}}>免责条款：</b>本工具按"现状"提供，不保证内容完全无误，学习效果因人而异，请以学校教学和官方教材为准。</p>
          <p style={{marginTop:10,textAlign:'center',color:'var(--text-soft)',fontSize:11}}>© 2026 阅读打卡 · 个人学习辅助工具 · 可自由分享</p>
        </div>
      )}
    </div>
  );
}

function BottomNav(){
  const { tab, setTab } = useApp();
  const items = [
    { key:'today', icon:'☀️', label:'今日' },
    { key:'calendar', icon:'📅', label:'打卡' },
    { key:'books', icon:'📚', label:'书架' },
    { key:'notes', icon:'📝', label:'笔记' },
    { key:'stats', icon:'🏆', label:'成就' },
  ];
  return (
    <nav className="bottom-nav">
      <div className="bottom-nav-inner">
        {items.map(it=>(
          <button key={it.key} className={`nav-item ${tab===it.key?'active':''}`} onClick={()=>setTab(it.key)}>
            <div className="nav-ico">{it.icon}</div>
            <span>{it.label}</span>
          </button>
        ))}
      </div>
    </nav>
  );
}

function Root(){
  const store = useStore();
  return (
    <AppCtx.Provider value={store}>
      <AppShell />
    </AppCtx.Provider>
  );
}

function bootstrap(){
  const s = loadState();
  if(!s.startDate){ s.startDate = todayStr(); saveState(s); }
}

bootstrap();
ReactDOM.createRoot(document.getElementById('root')).render(<Root />);

// 渲染完成后隐藏加载提示
setTimeout(()=>{ const el=document.getElementById('loading'); if(el) el.style.display='none'; }, 300);
</script>
</body>
</html>
